name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 47.94.229.233 >> ~/.ssh/known_hosts
          tar -czf /tmp/dist.tar.gz -C dist .
          scp -i ~/.ssh/deploy_key /tmp/dist.tar.gz root@47.94.229.233:/tmp/
          ssh -i ~/.ssh/deploy_key root@47.94.229.233 "cd /var/www/ai-learning-blog && rm -rf * && tar -xzf /tmp/dist.tar.gz && rm /tmp/dist.tar.gz && nginx -s reload"
